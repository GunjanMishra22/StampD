<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philatelia — Digital Stamp Atelier</title>
<style>
/* =============================================
   DESIGN TOKENS & BASE
   ============================================= */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&display=swap');

:root {
  --cream:     #f5f0e8;
  --parchment: #ede5d0;
  --warm-tan:  #c9b89a;
  --sienna:    #8b6a47;
  --umber:     #5c4230;
  --ink:       #2e1f0f;
  --gold:      #b8962e;
  --gold-lt:   #d4af5a;
  --rust:      #9b4a2a;
  --shadow:    rgba(46,31,15,0.18);
  --shadow-lg: rgba(46,31,15,0.32);
  --paper-bg:  #f0e9d6;

  --ease-out-expo: cubic-bezier(0.16,1,0.3,1);
  --ease-spring:   cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:   cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--ink);
  font-family: 'Jost', sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   GRAIN OVERLAY
   ============================================= */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.45;
  mix-blend-mode: multiply;
}

/* =============================================
   SCREEN SYSTEM
   ============================================= */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.55s var(--ease-smooth), transform 0.55s var(--ease-smooth);
  transform: translateY(12px);
  will-change: opacity, transform;
}
.screen.active {
  opacity: 1; pointer-events: all; transform: translateY(0);
}
.screen.exit {
  opacity: 0; transform: translateY(-12px);
}

/* =============================================
   ENTRY SCREEN
   ============================================= */
#screen-entry {
  background: var(--paper-bg);
}

.entry-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, #ede5d0 0%, #d6c9ae 55%, #c0b08a 100%);
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%   { background: radial-gradient(ellipse 80% 60% at 50% 40%, #ede5d0 0%, #d6c9ae 55%, #c0b08a 100%); }
  100% { background: radial-gradient(ellipse 80% 60% at 55% 45%, #f0e9d6 0%, #cfc0a0 55%, #b8a882 100%); }
}

.entry-frame {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 0;
  animation: entryReveal 1.1s var(--ease-out-expo) both;
}
@keyframes entryReveal {
  from { opacity: 0; transform: scale(0.94) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.entry-ornament {
  width: 120px; margin-bottom: 18px;
  opacity: 0.55;
}

.entry-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 6vw, 3.6rem);
  font-weight: 700;
  color: var(--umber);
  letter-spacing: 0.02em;
  line-height: 1;
  text-align: center;
}
.entry-subtitle {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: clamp(0.8rem, 2vw, 1rem);
  color: var(--sienna);
  letter-spacing: 0.12em;
  margin-top: 8px;
  text-align: center;
  opacity: 0.8;
}

.entry-divider {
  width: 80px; height: 1px;
  background: var(--warm-tan);
  margin: 28px auto;
}

.entry-actions {
  display: flex; gap: 16px;
  flex-wrap: wrap; justify-content: center;
}

.entry-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  padding: 28px 36px;
  background: var(--cream);
  border: 1.5px solid var(--warm-tan);
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.25s var(--ease-spring), box-shadow 0.25s var(--ease-smooth), background 0.2s;
  box-shadow: 0 4px 18px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
  min-width: 140px;
  position: relative; overflow: hidden;
}
.entry-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
  pointer-events: none;
}
.entry-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 32px var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.6);
  background: #faf6ee;
}
.entry-btn:active { transform: translateY(0) scale(0.98); }

.entry-btn svg { width: 38px; height: 38px; }

.entry-btn-label {
  font-family: 'Jost', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--umber);
}

.entry-footer {
  position: relative; z-index: 2;
  margin-top: 48px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  padding: 10px 20px;
  border: 1px solid var(--warm-tan);
  border-radius: 3px;
  background: rgba(245,240,232,0.6);
  transition: background 0.2s, transform 0.2s var(--ease-spring);
  animation: entryReveal 1.4s var(--ease-out-expo) both;
}
.entry-footer:hover { background: var(--cream); transform: scale(1.03); }
.entry-footer svg { width: 22px; height: 22px; opacity: 0.7; }
.entry-footer-label {
  font-family: 'Jost', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sienna);
}

/* =============================================
   CAMERA SCREEN
   ============================================= */
#screen-camera {
  background: #1a100a;
}

.camera-wrapper {
  position: relative; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

.camera-feed-wrap {
  position: relative;
  width: min(90vw, 480px);
  aspect-ratio: 1;
  border-radius: 2px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(184,150,46,0.4), 0 20px 60px rgba(0,0,0,0.7);
  animation: lensZoomIn 0.55s var(--ease-out-expo) both;
}
@keyframes lensZoomIn {
  from { transform: scale(0.82); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

#camera-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.camera-crosshair {
  position: absolute; inset: 0;
  pointer-events: none;
}
.camera-crosshair::before,
.camera-crosshair::after {
  content: '';
  position: absolute;
  background: rgba(184,150,46,0.5);
}
.camera-crosshair::before { left: 50%; top: 20%; bottom: 20%; width: 1px; transform: translateX(-50%); }
.camera-crosshair::after  { top: 50%; left: 20%; right: 20%; height: 1px; transform: translateY(-50%); }

.camera-corner {
  position: absolute;
  width: 22px; height: 22px;
  border-color: var(--gold);
  border-style: solid;
  border-width: 0;
  opacity: 0.7;
}
.camera-corner.tl { top: 14px; left: 14px; border-top-width: 2px; border-left-width: 2px; }
.camera-corner.tr { top: 14px; right: 14px; border-top-width: 2px; border-right-width: 2px; }
.camera-corner.bl { bottom: 14px; left: 14px; border-bottom-width: 2px; border-left-width: 2px; }
.camera-corner.br { bottom: 14px; right: 14px; border-bottom-width: 2px; border-right-width: 2px; }

.shutter-flash {
  position: absolute; inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
}
.shutter-flash.active {
  animation: shutterFlash 0.38s ease-out forwards;
}
@keyframes shutterFlash {
  0%   { opacity: 0.95; }
  100% { opacity: 0; }
}

.camera-controls {
  display: flex; align-items: center;
  justify-content: space-between;
  width: min(90vw, 480px);
  margin-top: 24px;
  gap: 16px;
}

.cam-btn-back {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: transparent;
  border: 1px solid rgba(184,150,46,0.4);
  border-radius: 3px;
  color: var(--gold-lt);
  font-family: 'Jost', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.cam-btn-back:hover { border-color: var(--gold); color: var(--gold); }
.cam-btn-back svg { width: 16px; height: 16px; }

.shutter-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: transform 0.18s var(--ease-spring);
  flex-shrink: 0;
}
.shutter-btn::after {
  content: '';
  position: absolute;
  inset: 7px;
  border-radius: 50%;
  background: var(--gold);
  transition: transform 0.18s var(--ease-spring);
}
.shutter-btn:hover { transform: scale(1.06); }
.shutter-btn:active { transform: scale(0.93); }
.shutter-btn:active::after { transform: scale(0.88); }

.cam-btn-flip {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: transparent;
  border: 1px solid rgba(184,150,46,0.4);
  border-radius: 3px;
  color: var(--gold-lt);
  font-family: 'Jost', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.cam-btn-flip:hover { border-color: var(--gold); color: var(--gold); }
.cam-btn-flip svg { width: 16px; height: 16px; }

/* =============================================
   EDITOR SCREEN
   ============================================= */
#screen-editor {
  background: var(--ink);
  flex-direction: column;
}

.editor-layout {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
  max-width: 700px;
  margin: 0 auto;
  padding: 0;
}

.editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid rgba(201,184,154,0.18);
  flex-shrink: 0;
}
.editor-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--warm-tan);
  letter-spacing: 0.04em;
}
.editor-step {
  font-family: 'Jost', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(201,184,154,0.5);
}

.editor-canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #1a100a;
  cursor: grab;
}
.editor-canvas-area:active { cursor: grabbing; }

#editor-canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  touch-action: none;
}

.editor-toolbar {
  flex-shrink: 0;
  background: #231508;
  border-top: 1px solid rgba(201,184,154,0.12);
  padding: 12px 16px;
}

.toolbar-section {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.toolbar-section:last-child { margin-bottom: 0; }

.toolbar-label {
  font-family: 'Jost', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(201,184,154,0.45);
  width: 56px;
  flex-shrink: 0;
}

.toolbar-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 2px;
  background: rgba(201,184,154,0.2);
  border-radius: 1px;
  outline: none;
  cursor: pointer;
}
.toolbar-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  border: 2px solid var(--ink);
  box-shadow: 0 0 0 1px var(--gold);
  transition: transform 0.15s var(--ease-spring);
}
.toolbar-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

.stencil-shape-row {
  display: flex; gap: 8px; flex-wrap: wrap;
}

.shape-btn {
  padding: 6px 12px;
  border: 1px solid rgba(201,184,154,0.25);
  background: transparent;
  border-radius: 2px;
  color: rgba(201,184,154,0.6);
  font-family: 'Jost', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.shape-btn.active, .shape-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(184,150,46,0.08);
}

.editor-footer {
  display: flex; gap: 10px;
  padding: 12px 16px;
  background: #1a100a;
  border-top: 1px solid rgba(201,184,154,0.12);
  flex-shrink: 0;
}

.editor-btn {
  flex: 1;
  padding: 13px;
  border: 1px solid;
  border-radius: 2px;
  font-family: 'Jost', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.18s var(--ease-spring), box-shadow 0.18s;
}
.editor-btn:active { transform: scale(0.97); }

.editor-btn-secondary {
  background: transparent;
  border-color: rgba(201,184,154,0.3);
  color: rgba(201,184,154,0.7);
}
.editor-btn-secondary:hover { border-color: var(--warm-tan); color: var(--warm-tan); }

.editor-btn-primary {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--ink);
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(184,150,46,0.3);
}
.editor-btn-primary:hover {
  background: var(--gold-lt);
  box-shadow: 0 6px 22px rgba(184,150,46,0.45);
}

/* Create stamp press animation */
.editor-btn-primary.pressing {
  animation: stampPress 0.35s var(--ease-spring);
}
@keyframes stampPress {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.93); }
  100% { transform: scale(1); }
}

/* =============================================
   PREVIEW SCREEN
   ============================================= */
#screen-preview {
  background: var(--ink);
}

.preview-inner {
  display: flex; flex-direction: column;
  align-items: center;
  width: 100%; height: 100%;
  padding: 0 20px 20px;
}

.preview-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 500px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(201,184,154,0.18);
  flex-shrink: 0;
}

.preview-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--warm-tan);
}

.preview-stamp-wrap {
  flex: 1; display: flex;
  align-items: center; justify-content: center;
  position: relative;
}

.preview-stamp-img {
  max-width: min(85vw, 340px);
  max-height: 45vh;
  object-fit: contain;
  filter: drop-shadow(0 12px 40px rgba(0,0,0,0.7));
  animation: stampBounceIn 0.55s var(--ease-spring) both;
}
@keyframes stampBounceIn {
  from { transform: scale(0.7) translateY(20px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}

.preview-stamp-img:hover {
  animation: stampTilt 0.4s var(--ease-smooth) forwards;
}
@keyframes stampTilt {
  0%   { transform: scale(1) rotate(0deg); }
  50%  { transform: scale(1.03) rotate(-1.5deg); }
  100% { transform: scale(1.02) rotate(-0.8deg); }
}

.preview-actions {
  display: flex; gap: 10px;
  width: 100%; max-width: 500px;
  flex-shrink: 0;
}

/* =============================================
   BOOK SCREEN
   ============================================= */
#screen-book {
  background: #1a0f08;
  perspective: 1200px;
}

.book-container {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center;
}

.book-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 20px;
  border-bottom: 1px solid rgba(201,184,154,0.15);
  flex-shrink: 0;
}
.book-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--warm-tan);
}
.book-count {
  font-family: 'Jost', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(201,184,154,0.45);
}

.book-pages-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  width: 100%;
}

.book-page {
  position: absolute; inset: 16px;
  background: var(--parchment);
  border-radius: 2px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
  overflow: hidden;
  backface-visibility: hidden;
  transform-origin: left center;
  transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000);
}
.book-page::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(201,184,154,0.25) 31px, rgba(201,184,154,0.25) 32px),
    linear-gradient(90deg, rgba(201,184,154,0.15) 0%, transparent 8%);
  pointer-events: none;
}
.book-page::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.08) 0%, transparent 12%);
  pointer-events: none;
}

.page-flip-out {
  animation: pageFlipOut 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
}
@keyframes pageFlipOut {
  from { transform: perspective(1000px) rotateY(0deg); box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  to   { transform: perspective(1000px) rotateY(-90deg); box-shadow: -12px 8px 40px rgba(0,0,0,0.3); }
}
.page-flip-in {
  animation: pageFlipIn 0.7s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
}
@keyframes pageFlipIn {
  from { transform: perspective(1000px) rotateY(90deg); }
  to   { transform: perspective(1000px) rotateY(0deg); }
}

.stamps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 24px;
  position: relative; z-index: 1;
}

.stamp-slot {
  aspect-ratio: 1;
  border: 1.5px dashed rgba(140,106,71,0.35);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s;
  overflow: hidden;
  position: relative;
}
.stamp-slot:empty { border-style: dashed; }
.stamp-slot.has-stamp { border-style: solid; border-color: rgba(140,106,71,0.5); }
.stamp-slot.has-stamp:hover { border-color: var(--sienna); }

.stamp-slot img {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 4px;
  transition: transform 0.25s var(--ease-spring);
}
.stamp-slot img:hover { transform: scale(1.07); }

/* Page full shimmer */
.page-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,220,0.3) 50%, transparent 70%);
  background-size: 200% 100%;
  animation: shimmerSweep 1.2s ease-in-out;
  pointer-events: none;
  z-index: 5;
}
@keyframes shimmerSweep {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* Glow pulse on full page */
.page-glow {
  animation: glowPulse 0.9s ease-in-out;
}
@keyframes glowPulse {
  0%   { box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  50%  { box-shadow: 0 8px 40px rgba(184,150,46,0.35), 0 0 60px rgba(184,150,46,0.2); }
  100% { box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
}

.book-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 16px;
  padding: 14px;
  flex-shrink: 0;
}
.book-nav-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 18px;
  background: transparent;
  border: 1px solid rgba(201,184,154,0.25);
  border-radius: 2px;
  color: rgba(201,184,154,0.6);
  font-family: 'Jost', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.book-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
.book-nav-btn:disabled { opacity: 0.25; pointer-events: none; }
.book-nav-btn svg { width: 14px; height: 14px; }

.book-page-indicator {
  font-family: 'Libre Baskerville', serif;
  font-style: italic;
  font-size: 0.8rem;
  color: rgba(201,184,154,0.5);
  min-width: 60px;
  text-align: center;
}

.book-footer {
  display: flex; justify-content: center; gap: 10px;
  padding: 12px 20px 16px;
  flex-shrink: 0;

<script>
/* =============================================
   STATE
   ============================================= */
const state = {
  currentScreen: 'entry',
  sourceImageData: null,  // data URL of the loaded image
  stampDataURL: null,     // generated stamp PNG
  stamps: [],             // array of data URLs
  currentPage: 0,         // page index
  STAMPS_PER_PAGE: 9,
  stencilShape: 'rect',

  // Editor interaction
  imgX: 0, imgY: 0,
  imgScale: 1,
  imgRotate: 0,
  stencilScale: 0.65,     // fraction of canvas size

  // Camera
  cameraStream: null,
  facingMode: 'environment',

  // Canvas size
  canvasSize: 0,
};

/* =============================================
   SCREEN ROUTER
   ============================================= */
function showScreen(id) {
  const current = document.querySelector('.screen.active');
  const next    = document.getElementById('screen-' + id);
  if (!next || (current === next)) return;
  if (current) {
    current.classList.add('exit');
    setTimeout(() => { current.classList.remove('active', 'exit'); }, 560);
  }
  setTimeout(() => { next.classList.add('active'); }, 60);
  state.currentScreen = id;
}

/* =============================================
   TOAST
   ============================================= */
function showToast(msg, dur = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), dur);
}

/* =============================================
   ENTRY SCREEN
   ============================================= */
document.getElementById('btn-open-camera').addEventListener('click', openCamera);
document.getElementById('btn-open-upload').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('btn-open-book').addEventListener('click', () => {
  showScreen('book');
  renderBook();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state.sourceImageData = ev.target.result;
    e.target.value = '';
    openEditor();
  };
  reader.readAsDataURL(file);
});

/* =============================================
   CAMERA
   ============================================= */
async function openCamera() {
  showScreen('camera');
  await startCamera();
}

async function startCamera() {
  stopCamera();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } }
    });
    state.cameraStream = stream;
    const video = document.getElementById('camera-video');
    video.srcObject = stream;
  } catch (err) {
    showToast('Camera unavailable — please upload an image.');
    showScreen('entry');
  }
}

function stopCamera() {
  if (state.cameraStream) {
    state.cameraStream.getTracks().forEach(t => t.stop());
    state.cameraStream = null;
  }
}

document.getElementById('btn-cam-back').addEventListener('click', () => {
  stopCamera();
  showScreen('entry');
});

document.getElementById('btn-cam-flip').addEventListener('click', () => {
  state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('btn-shutter').addEventListener('click', () => {
  const flash = document.getElementById('shutter-flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 400);

  const video = document.getElementById('camera-video');
  const cap   = document.getElementById('capture-canvas');
  const size  = Math.min(video.videoWidth, video.videoHeight);
  cap.width  = size;
  cap.height = size;
  const ctx = cap.getContext('2d');
  const ox = (video.videoWidth  - size) / 2;
  const oy = (video.videoHeight - size) / 2;
  ctx.drawImage(video, ox, oy, size, size, 0, 0, size, size);
  state.sourceImageData = cap.toDataURL('image/jpeg', 0.92);

  setTimeout(() => {
    stopCamera();
    openEditor();
  }, 320);
});

/* =============================================
   EDITOR — Canvas Setup
   ============================================= */
let editorCanvas, editorCtx;
let sourceImg = null;
let isDragging = false, lastX = 0, lastY = 0;
let isPinching = false, pinchDist0 = 0, pinchScale0 = 1, pinchAngle0 = 0;

function openEditor() {
  showScreen('editor');
  resetEditorState();
  initEditorCanvas();
  loadSourceImage(() => {
    fitImageToCanvas();
    drawEditor();
  });
}

function resetEditorState() {
  state.imgX = 0; state.imgY = 0;
  state.imgScale = 1; state.imgRotate = 0;
  state.stencilScale = 0.65;
  state.stencilShape = 'rect';
  document.getElementById('img-zoom').value   = 100;
  document.getElementById('img-rotate').value = 0;
  document.getElementById('stencil-scale').value = 65;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-shape="rect"]').classList.add('active');
}

function initEditorCanvas() {
  editorCanvas = document.getElementById('editor-canvas');
  editorCtx    = editorCanvas.getContext('2d');
  const area   = document.getElementById('editor-canvas-area');
  const sz     = Math.min(area.clientWidth, area.clientHeight, 500);
  state.canvasSize = sz;
  editorCanvas.width  = sz;
  editorCanvas.height = sz;
  editorCanvas.style.width  = sz + 'px';
  editorCanvas.style.height = sz + 'px';
}

function loadSourceImage(cb) {
  sourceImg = new Image();
  sourceImg.onload = cb;
  sourceImg.src = state.sourceImageData;
}

function fitImageToCanvas() {
  const cs = state.canvasSize;
  const asp = sourceImg.width / sourceImg.height;
  let w, h;
  if (asp >= 1) { w = cs; h = cs / asp; }
  else          { h = cs; w = cs * asp; }
  state.imgScale = w / sourceImg.width;
  state.imgX = (cs - w) / 2;
  state.imgY = (cs - h) / 2;
}

/* =============================================
   EDITOR DRAWING
   ============================================= */
function drawEditor() {
  if (!editorCtx) return;
  const cs  = state.canvasSize;
  const ctx = editorCtx;
  ctx.clearRect(0, 0, cs, cs);

  // — Draw image (behind stencil)
  ctx.save();
  ctx.translate(state.imgX + (sourceImg.width * state.imgScale) / 2,
                state.imgY + (sourceImg.height * state.imgScale) / 2);
  ctx.rotate(state.imgRotate * Math.PI / 180);
  ctx.scale(state.imgScale, state.imgScale);
  ctx.drawImage(sourceImg, -sourceImg.width / 2, -sourceImg.height / 2);
  ctx.restore();

  // — Dim overlay outside stencil
  const stencilSize = cs * state.stencilScale;
  const cx = cs / 2, cy = cs / 2;

  ctx.save();
  // Full dim layer
  ctx.fillStyle = 'rgba(26,16,10,0.62)';
  ctx.fillRect(0, 0, cs, cs);

  // Cut out the stencil shape using composite
  ctx.globalCompositeOperation = 'destination-out';
  ctx.fillStyle = 'rgba(0,0,0,1)';
  drawStencilPath(ctx, cx, cy, stencilSize, stencilSize);
  ctx.fill();
  ctx.restore();

  // — Stencil border (perforations)
  ctx.save();
  drawStencilPerforations(ctx, cx, cy, stencilSize, stencilSize);
  ctx.restore();
}

function drawStencilPath(ctx, cx, cy, w, h) {
  const hw = w / 2, hh = h / 2;
  ctx.beginPath();
  switch (state.stencilShape) {
    case 'rect':
      ctx.rect(cx - hw, cy - hh, w, h);
      break;
    case 'oval':
      ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2);
      break;
    case 'diamond': {
      ctx.moveTo(cx, cy - hh);
      ctx.lineTo(cx + hw, cy);
      ctx.lineTo(cx, cy + hh);
      ctx.lineTo(cx - hw, cy);
      ctx.closePath();
      break;
    }
    case 'hexagon': {
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const px = cx + hw * Math.cos(angle);
        const py = cy + hh * Math.sin(angle);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      break;
    }
  }
}

function drawStencilPerforations(ctx, cx, cy, w, h) {
  const hw = w / 2, hh = h / 2;
  const dotR = 3.5;
  const gap  = 14;
  ctx.fillStyle = 'rgba(201,184,154,0.7)';

  // Generate points around perimeter
  const pts = [];
  switch (state.stencilShape) {
    case 'rect': {
      const perimeter = 2 * (w + h);
      const count = Math.floor(perimeter / gap);
      for (let i = 0; i < count; i++) {
        const d = (i / count) * perimeter;
        let px, py;
        if (d < w)          { px = cx - hw + d; py = cy - hh; }
        else if (d < w + h) { px = cx + hw; py = cy - hh + (d - w); }
        else if (d < 2*w+h) { px = cx + hw - (d - w - h); py = cy + hh; }
        else                 { px = cx - hw; py = cy + hh - (d - 2*w - h); }
        pts.push([px, py]);
      }
      break;
    }
    case 'oval': {
      const count = Math.max(24, Math.floor((w + h) * Math.PI / gap));
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        pts.push([cx + hw * Math.cos(a), cy + hh * Math.sin(a)]);
      }
      break;
    }
    case 'diamond': {
      const sides = [[cx, cy-hh, cx+hw, cy], [cx+hw, cy, cx, cy+hh],
                     [cx, cy+hh, cx-hw, cy], [cx-hw, cy, cx, cy-hh]];
      for (const [x1,y1,x2,y2] of sides) {
        const len = Math.hypot(x2-x1, y2-y1);
        const n = Math.floor(len / gap);
        for (let i = 0; i < n; i++) { pts.push([x1+(x2-x1)*i/n, y1+(y2-y1)*i/n]); }
      }
      break;
    }
    case 'hexagon': {
      for (let s = 0; s < 6; s++) {
        const a1 = (Math.PI/3)*s - Math.PI/6;
        const a2 = (Math.PI/3)*(s+1) - Math.PI/6;
        const x1 = cx + hw*Math.cos(a1), y1 = cy + hh*Math.sin(a1);
        const x2 = cx + hw*Math.cos(a2), y2 = cy + hh*Math.sin(a2);
        const n = Math.floor(Math.hypot(x2-x1,y2-y1)/gap);
        for (let i = 0; i < n; i++) { pts.push([x1+(x2-x1)*i/n, y1+(y2-y1)*i/n]); }
      }
      break;
    }
  }

  for (const [px, py] of pts) {
    ctx.beginPath();
    ctx.arc(px, py, dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* =============================================
   EDITOR CONTROLS — Sliders & Shapes
   ============================================= */
document.getElementById('img-zoom').addEventListener('input', e => {
  const cs = state.canvasSize;
  const centerX = state.imgX + (sourceImg.width * state.imgScale) / 2;
  const centerY = state.imgY + (sourceImg.height * state.imgScale) / 2;
  state.imgScale = e.target.value / 100;
  state.imgX = centerX - (sourceImg.width * state.imgScale) / 2;
  state.imgY = centerY - (sourceImg.height * state.imgScale) / 2;
  drawEditor();
});

document.getElementById('img-rotate').addEventListener('input', e => {
  state.imgRotate = parseInt(e.target.value);
  drawEditor();
});

document.getElementById('stencil-scale').addEventListener('input', e => {
  state.stencilScale = e.target.value / 100;
  drawEditor();
});

document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.stencilShape = btn.dataset.shape;
    drawEditor();
  });
});

document.getElementById('btn-editor-reset').addEventListener('click', () => {
  resetEditorState();
  fitImageToCanvas();
  drawEditor();
});

document.getElementById('btn-editor-back').addEventListener('click', () => {
  stopCamera();
  showScreen('entry');
});

/* =============================================
   EDITOR — Drag Interaction (Mouse + Touch)
   ============================================= */
const editorArea = document.getElementById('editor-canvas-area');

function pointerDown(x, y) {
  isDragging = true;
  lastX = x; lastY = y;
}
function pointerMove(x, y) {
  if (!isDragging) return;
  state.imgX += x - lastX;
  state.imgY += y - lastY;
  lastX = x; lastY = y;
  drawEditor();
}
function pointerUp() { isDragging = false; }

editorCanvas.addEventListener('mousedown', e => { pointerDown(e.offsetX, e.offsetY); });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const rect = editorCanvas.getBoundingClientRect();
  pointerMove(e.clientX - rect.left, e.clientY - rect.top);
});
window.addEventListener('mouseup', pointerUp);

editorCanvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const rect = editorCanvas.getBoundingClientRect();
    pointerDown(t.clientX - rect.left, t.clientY - rect.top);
  } else if (e.touches.length === 2) {
    isPinching = true; isDragging = false;
    pinchDist0  = getTouchDist(e.touches);
    pinchScale0 = state.imgScale;
    pinchAngle0 = getTouchAngle(e.touches);
  }
  e.preventDefault();
}, { passive: false });

editorCanvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && !isPinching) {
    const t = e.touches[0];
    const rect = editorCanvas.getBoundingClientRect();
    pointerMove(t.clientX - rect.left, t.clientY - rect.top);
  } else if (e.touches.length === 2 && isPinching) {
    const dist  = getTouchDist(e.touches);
    const angle = getTouchAngle(e.touches);
    state.imgScale  = pinchScale0 * (dist / pinchDist0);
    state.imgRotate += (angle - pinchAngle0) * (180 / Math.PI);
    pinchAngle0 = angle;
    document.getElementById('img-zoom').value   = state.imgScale * 100;
    document.getElementById('img-rotate').value = state.imgRotate;
    drawEditor();
  }
  e.preventDefault();
}, { passive: false });

editorCanvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) isPinching = false;
  if (e.touches.length === 0) pointerUp();
}, { passive: false });

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}
function getTouchAngle(touches) {
  return Math.atan2(touches[1].clientY - touches[0].clientY, touches[1].clientX - touches[0].clientX);
}

/* =============================================
   STAMP GENERATION
   ============================================= */
document.getElementById('btn-create-stamp').addEventListener('click', () => {
  const btn = document.getElementById('btn-create-stamp');
  btn.classList.add('pressing');
  setTimeout(() => btn.classList.remove('pressing'), 400);
  setTimeout(generateStamp, 200);
});

function generateStamp() {
  const cs   = state.canvasSize;
  const size = Math.round(cs * state.stencilScale);
  const pad  = 18; // space for perforations
  const total = size + pad * 2;

  const out = document.createElement('canvas');
  out.width  = total;
  out.height = total;
  const ctx  = out.getContext('2d');

  const cx = total / 2, cy = total / 2;
  const hw = size / 2, hh = size / 2;

  // — Clip to stencil shape
  ctx.save();
  drawStencilPathOnCtx(ctx, cx, cy, size, size);
  ctx.clip();

  // — Draw image transformed to match editor view
  const edCx = cs / 2, edCy = cs / 2;
  const imgCx = state.imgX + (sourceImg.width * state.imgScale) / 2;
  const imgCy = state.imgY + (sourceImg.height * state.imgScale) / 2;
  const dx = imgCx - edCx;
  const dy = imgCy - edCy;
  ctx.translate(cx + dx, cy + dy);
  ctx.rotate(state.imgRotate * Math.PI / 180);
  ctx.scale(state.imgScale, state.imgScale);
  ctx.drawImage(sourceImg, -sourceImg.width / 2, -sourceImg.height / 2);
  ctx.restore();

  // — Paper texture overlay
  ctx.save();
  drawStencilPathOnCtx(ctx, cx, cy, size, size);
  ctx.clip();
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < total * 1.5; i++) {
    const x = Math.random() * total;
    const y = Math.random() * total;
    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.4)';
    ctx.fillRect(x, y, 1, 1);
  }
  ctx.globalAlpha = 1;
  // vignette
  const vg = ctx.createRadialGradient(cx, cy, size*0.25, cx, cy, size*0.6);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.18)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, total, total);
  ctx.restore();

  // — Emboss highlight
  ctx.save();
  drawStencilPathOnCtx(ctx, cx, cy, size, size);
  ctx.clip();
  const eg = ctx.createLinearGradient(cx - hw, cy - hh, cx + hw * 0.5, cy + hh * 0.5);
  eg.addColorStop(0, 'rgba(255,255,255,0.12)');
  eg.addColorStop(1, 'rgba(0,0,0,0.06)');
  ctx.fillStyle = eg;
  ctx.fill();
  ctx.restore();

  // — Stencil border (filled outline for clean edge)
  ctx.save();
  ctx.strokeStyle = 'rgba(201,184,154,0.45)';
  ctx.lineWidth = 1.5;
  drawStencilPathOnCtx(ctx, cx, cy, size, size);
  ctx.stroke();
  ctx.restore();

  // — Perforations around border
  const dotR = 3.8;
  const gap  = 13;
  ctx.fillStyle = 'rgba(30,18,10,0.85)';

  const pts = getPerimeterPoints(cx, cy, size, size, gap);
  for (const [px, py] of pts) {
    ctx.beginPath();
    ctx.arc(px, py, dotR, 0, Math.PI * 2);
    ctx.fill();
  }

  // — Drop shadow at bottom-right (rendered via CSS on the img element)
  state.stampDataURL = out.toDataURL('image/png');
  showPreview();
}

function drawStencilPathOnCtx(ctx, cx, cy, w, h) {
  const hw = w / 2, hh = h / 2;
  ctx.beginPath();
  switch (state.stencilShape) {
    case 'rect': ctx.rect(cx - hw, cy - hh, w, h); break;
    case 'oval': ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2); break;
    case 'diamond':
      ctx.moveTo(cx, cy - hh); ctx.lineTo(cx + hw, cy);
      ctx.lineTo(cx, cy + hh); ctx.lineTo(cx - hw, cy);
      ctx.closePath(); break;
    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const px = cx + hw * Math.cos(a), py = cy + hh * Math.sin(a);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); break;
  }
}

function getPerimeterPoints(cx, cy, w, h, gap) {
  const pts = [];
  const hw = w / 2, hh = h / 2;
  switch (state.stencilShape) {
    case 'rect': {
      const perimeter = 2 * (w + h);
      const count = Math.floor(perimeter / gap);
      for (let i = 0; i < count; i++) {
        const d = (i / count) * perimeter;
        let px, py;
        if (d < w)           { px = cx - hw + d; py = cy - hh; }
        else if (d < w + h)  { px = cx + hw; py = cy - hh + (d - w); }
        else if (d < 2*w+h)  { px = cx + hw - (d - w - h); py = cy + hh; }
        else                  { px = cx - hw; py = cy + hh - (d - 2*w - h); }
        pts.push([px, py]);
      }
      break;
    }
    case 'oval': {
      const count = Math.max(24, Math.floor((w + h) * Math.PI / gap));
      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 2;
        pts.push([cx + (hw + 8) * Math.cos(a), cy + (hh + 8) * Math.sin(a)]);
      }
      break;
    }
    case 'diamond': {
      const sides = [[cx, cy-hh-8, cx+hw+8, cy], [cx+hw+8, cy, cx, cy+hh+8],
                     [cx, cy+hh+8, cx-hw-8, cy], [cx-hw-8, cy, cx, cy-hh-8]];
      for (const [x1,y1,x2,y2] of sides) {
        const len = Math.hypot(x2-x1, y2-y1);
        const n = Math.floor(len / gap);
        for (let i = 0; i < n; i++) pts.push([x1+(x2-x1)*i/n, y1+(y2-y1)*i/n]);
      }
      break;
    }
    case 'hexagon': {
      for (let s = 0; s < 6; s++) {
        const a1 = (Math.PI/3)*s - Math.PI/6;
        const a2 = (Math.PI/3)*(s+1) - Math.PI/6;
        const x1 = cx + (hw+8)*Math.cos(a1), y1 = cy + (hh+8)*Math.sin(a1);
        const x2 = cx + (hw+8)*Math.cos(a2), y2 = cy + (hh+8)*Math.sin(a2);
        const n = Math.floor(Math.hypot(x2-x1, y2-y1) / gap);
        for (let i = 0; i < n; i++) pts.push([x1+(x2-x1)*i/n, y1+(y2-y1)*i/n]);
      }
      break;
    }
  }
  return pts;
}

/* =============================================
   PREVIEW SCREEN
   ============================================= */
function showPreview() {
  const img = document.getElementById('preview-stamp-img');
  img.src = state.stampDataURL;
  img.style.display = 'block';
  // Re-trigger animation
  img.classList.remove('preview-stamp-img');
  void img.offsetWidth;
  img.classList.add('preview-stamp-img');
  showScreen('preview');
}

document.getElementById('btn-preview-back').addEventListener('click', () => showScreen('editor'));
document.getElementById('btn-preview-redo').addEventListener('click', () => showScreen('editor'));

document.getElementById('btn-export-stamp').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href     = state.stampDataURL;
  a.download = 'stamp-' + Date.now() + '.png';
  a.click();
  showToast('Stamp exported');
});

document.getElementById('btn-add-to-book').addEventListener('click', () => {
  state.stamps.push(state.stampDataURL);
  showScreen('book');
  renderBook();
  showToast('Stamp added to collection');
  // Check if page just filled
  const SLOTS = state.STAMPS_PER_PAGE;
  const pageStamps = state.stamps.slice(state.currentPage * SLOTS, (state.currentPage + 1) * SLOTS);
  if (pageStamps.length === SLOTS) {
    const page = document.getElementById('current-page');
    page.classList.add('page-glow');
    setTimeout(() => {
      const shimmer = document.createElement('div');
      shimmer.className = 'page-shimmer';
      page.appendChild(shimmer);
      setTimeout(() => shimmer.remove(), 1300);
    }, 100);
    setTimeout(() => page.classList.remove('page-glow'), 1000);
  }
});

/* =============================================
   BOOK SCREEN
   ============================================= */
function renderBook() {
  const SLOTS = state.STAMPS_PER_PAGE;
  const totalPages = Math.max(1, Math.ceil(state.stamps.length / SLOTS));
  if (state.currentPage >= totalPages) state.currentPage = totalPages - 1;

  const grid = document.getElementById('stamps-grid');
  grid.innerHTML = '';

  const start = state.currentPage * SLOTS;
  const count = document.getElementById('book-count');
  count.textContent = state.stamps.length + (state.stamps.length === 1 ? ' stamp' : ' stamps');

  for (let i = 0; i < SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'stamp-slot';
    if (state.stamps[start + i]) {
      slot.classList.add('has-stamp');
      const img = document.createElement('img');
      img.src = state.stamps[start + i];
      img.alt = 'Stamp ' + (start + i + 1);
      slot.appendChild(img);
    }
    grid.appendChild(slot);
  }

  const pageInd = document.getElementById('page-indicator');
  pageInd.textContent = (state.currentPage + 1) + ' / ' + totalPages;

  document.getElementById('btn-prev-page').disabled = state.currentPage === 0;
  document.getElementById('btn-next-page').disabled = state.currentPage >= totalPages - 1;
}

function flipPage(direction) {
  const wrap = document.getElementById('book-pages-wrap');
  const old  = document.getElementById('current-page');

  // Animate outgoing
  old.classList.add(direction === 1 ? 'page-flip-out' : 'page-flip-in-reverse');
  old.style.transform = direction === 1
    ? 'perspective(1000px) rotateY(-90deg)'
    : 'perspective(1000px) rotateY(90deg)';
  old.style.transition = 'transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000)';

  state.currentPage += direction;

  setTimeout(() => {
    old.style.transform = '';
    old.style.transition = '';
    old.classList.remove('page-flip-out', 'page-flip-in-reverse');

    // Animate incoming
    old.style.transform = direction === 1
      ? 'perspective(1000px) rotateY(90deg)'
      : 'perspective(1000px) rotateY(-90deg)';
    old.style.transition = 'none';
    renderBook();

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        old.style.transition = 'transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1.000)';
        old.style.transform  = 'perspective(1000px) rotateY(0deg)';
        setTimeout(() => { old.style.transform = ''; old.style.transition = ''; }, 650);
      });
    });
  }, 600);
}

document.getElementById('btn-prev-page').addEventListener('click', () => flipPage(-1));
document.getElementById('btn-next-page').addEventListener('click', () => flipPage(1));

document.getElementById('btn-book-home').addEventListener('click', () => showScreen('entry'));
document.getElementById('btn-book-add-new').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('btn-export-page').addEventListener('click', () => {
  const SLOTS = state.STAMPS_PER_PAGE;
  const start  = state.currentPage * SLOTS;
  const stamps = state.stamps.slice(start, start + SLOTS);
  if (!stamps.length) { showToast('No stamps on this page'); return; }

  const cols = 3, rows = 3;
  const stampSz = 200, padding = 24, bgPad = 36;
  const W = cols * stampSz + (cols - 1) * padding + bgPad * 2;
  const H = rows * stampSz + (rows - 1) * padding + bgPad * 2;

  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');

  // Paper bg
  ctx.fillStyle = '#ede5d0';
  ctx.fillRect(0, 0, W, H);
  // Light grid lines
  ctx.strokeStyle = 'rgba(201,184,154,0.3)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= rows; r++) {
    const y = bgPad + r * (stampSz + padding) - padding / 2;
    ctx.beginPath(); ctx.moveTo(bgPad, y); ctx.lineTo(W - bgPad, y); ctx.stroke();
  }

  const loadPromises = stamps.map((src, idx) => new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const col = idx % cols, row = Math.floor(idx / cols);
      const x = bgPad + col * (stampSz + padding);
      const y = bgPad + row * (stampSz + padding);
      ctx.drawImage(img, x, y, stampSz, stampSz);
      res();
    };
    img.src = src;
  }));

  Promise.all(loadPromises).then(() => {
    const a = document.createElement('a');
    a.href     = out.toDataURL('image/png');
    a.download = 'collection-page-' + (state.currentPage + 1) + '.png';
    a.click();
    showToast('Page exported');
  });
});

/* =============================================
   WINDOW RESIZE — Redraw editor canvas
   ============================================= */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (state.currentScreen === 'editor' && sourceImg) {
      initEditorCanvas();
      fitImageToCanvas();
      drawEditor();
    }
  }, 200);
});

/* =============================================
   INITIAL SCREEN
   ============================================= */
showScreen('entry');
</script>
