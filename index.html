*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--board-bg);font-family:'Jost',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}

/* GRAIN OVERLAY */
body::before{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:0.6;mix-blend-mode:multiply
}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.5s var(--ease-smooth),transform 0.5s var(--ease-smooth);transform:translateY(14px);will-change:opacity,transform}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}
.screen.exit{opacity:0;transform:translateY(-14px)}

/* ============ ENTRY SCREEN ============ */
#screen-entry{background:var(--parchment-tex),var(--parchment);background-size:256px 256px,cover}

.entry-bg{position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 40%,rgba(255,248,235,0.85) 0%,rgba(240,232,208,0.75) 55%,rgba(210,185,150,0.6) 100%)}

.entry-frame{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:0;animation:entryReveal 1.1s var(--ease-out-expo) both}
@keyframes entryReveal{from{opacity:0;transform:scale(0.93) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}

.entry-ornament{width:110px;margin-bottom:16px;opacity:0.6}

.entry-title{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.8rem);font-weight:700;color:var(--umber);letter-spacing:0.02em;line-height:1;text-align:center;text-shadow:0 2px 8px rgba(107,76,48,0.12)}
.entry-subtitle{font-family:'Libre Baskerville',serif;font-style:italic;font-size:clamp(0.78rem,2vw,0.96rem);color:var(--sienna);letter-spacing:0.14em;margin-top:8px;text-align:center;opacity:0.85}

.entry-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--warm-tan),transparent);margin:24px auto}

.entry-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

.entry-btn{
  display:flex;flex-direction:column;align-items:center;gap:11px;padding:24px 32px;
  background:linear-gradient(160deg,#fff9f0 0%,var(--cream) 60%,#f0e6d0 100%);
  border:1.5px solid rgba(180,150,100,0.4);border-radius:6px;cursor:pointer;min-width:136px;
  box-shadow:0 2px 8px var(--shadow),0 6px 24px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.8),inset 0 -1px 0 rgba(180,140,80,0.2);
  transition:transform 0.22s var(--ease-spring),box-shadow 0.22s var(--ease-smooth);position:relative;overflow:hidden
}
.entry-btn::before{content:'';position:absolute;inset:0;background:var(--paper-tex);background-size:256px 256px;opacity:0.18;pointer-events:none}
.entry-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.35) 0%,transparent 55%);pointer-events:none}
.entry-btn:hover{transform:translateY(-4px) scale(1.025);box-shadow:0 4px 12px var(--shadow),0 14px 40px var(--shadow-md),inset 0 1px 0 rgba(255,255,255,0.8)}
.entry-btn:active{transform:translateY(0) scale(0.97);box-shadow:0 1px 4px var(--shadow),inset 0 2px 4px rgba(0,0,0,0.06)}
.entry-btn svg{width:36px;height:36px;position:relative;z-index:1}
.entry-btn-label{font-family:'Jost',sans-serif;font-size:0.75rem;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--umber);position:relative;z-index:1}

.entry-footer{position:relative;z-index:2;margin-top:40px;display:flex;align-items:center;gap:11px;cursor:pointer;padding:10px 20px;border:1px solid rgba(180,150,100,0.35);border-radius:4px;background:rgba(250,246,238,0.7);backdrop-filter:blur(4px);transition:background 0.2s,transform 0.2s var(--ease-spring);animation:entryReveal 1.4s var(--ease-out-expo) both}
.entry-footer:hover{background:var(--cream);transform:scale(1.04)}
.entry-footer svg{width:20px;height:20px;opacity:0.65}
.entry-footer-label{font-family:'Jost',sans-serif;font-size:0.73rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--sienna)}

/* ============ CAMERA SCREEN ============ */
#screen-camera{background:#140c04}
.camera-wrapper{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.camera-feed-wrap{position:relative;width:min(90vw,480px);aspect-ratio:1;border-radius:3px;overflow:hidden;box-shadow:0 0 0 1px rgba(200,168,64,0.4),0 20px 60px rgba(0,0,0,0.7);animation:lensZoomIn 0.55s var(--ease-out-expo) both}
@keyframes lensZoomIn{from{transform:scale(0.82);opacity:0}to{transform:scale(1);opacity:1}}
#camera-video{width:100%;height:100%;object-fit:cover;display:block}
.camera-crosshair{position:absolute;inset:0;pointer-events:none}
.camera-crosshair::before,.camera-crosshair::after{content:'';position:absolute;background:rgba(200,168,64,0.45)}
.camera-crosshair::before{left:50%;top:20%;bottom:20%;width:1px;transform:translateX(-50%)}
.camera-crosshair::after{top:50%;left:20%;right:20%;height:1px;transform:translateY(-50%)}
.camera-corner{position:absolute;width:22px;height:22px;border-color:var(--gold);border-style:solid;border-width:0;opacity:0.75}
.camera-corner.tl{top:14px;left:14px;border-top-width:2px;border-left-width:2px}
.camera-corner.tr{top:14px;right:14px;border-top-width:2px;border-right-width:2px}
.camera-corner.bl{bottom:14px;left:14px;border-bottom-width:2px;border-left-width:2px}
.camera-corner.br{bottom:14px;right:14px;border-bottom-width:2px;border-right-width:2px}
.shutter-flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:10}
.shutter-flash.active{animation:shutterFlash 0.38s ease-out forwards}
@keyframes shutterFlash{0%{opacity:0.95}100%{opacity:0}}
.camera-controls{display:flex;align-items:center;justify-content:space-between;width:min(90vw,480px);margin-top:24px;gap:16px}
.cam-btn-back,.cam-btn-flip{display:flex;align-items:center;gap:8px;padding:10px 18px;background:transparent;border:1px solid rgba(200,168,64,0.4);border-radius:3px;color:var(--gold-lt);font-family:'Jost',sans-serif;font-size:0.73rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s}
.cam-btn-back:hover,.cam-btn-flip:hover{border-color:var(--gold);color:var(--gold)}
.cam-btn-back svg,.cam-btn-flip svg{width:16px;height:16px}
.shutter-btn{width:64px;height:64px;border-radius:50%;border:3px solid var(--gold);background:transparent;cursor:pointer;position:relative;transition:transform 0.18s var(--ease-spring);flex-shrink:0}
.shutter-btn::after{content:'';position:absolute;inset:7px;border-radius:50%;background:var(--gold);transition:transform 0.18s var(--ease-spring)}
.shutter-btn:hover{transform:scale(1.06)}
.shutter-btn:active{transform:scale(0.93)}
.shutter-btn:active::after{transform:scale(0.88)}

/* ============ EDITOR SCREEN ============ */
#screen-editor{background:var(--ink)}
.editor-layout{display:flex;flex-direction:column;width:100%;height:100%;max-width:700px;margin:0 auto}
.editor-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid rgba(180,150,100,0.2);flex-shrink:0;background:rgba(58,37,16,0.95)}
.editor-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--warm-tan);letter-spacing:0.04em}
.editor-step{font-family:'Jost',sans-serif;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(212,184,150,0.45)}
.editor-canvas-area{flex:1;position:relative;overflow:hidden;background:#1a0e06;cursor:crosshair}
#editor-canvas{display:block;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);touch-action:none}
.editor-drag-hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Jost',sans-serif;font-size:0.6rem;letter-spacing:0.13em;text-transform:uppercase;color:rgba(200,168,64,0.4);pointer-events:none;z-index:2;transition:opacity 0.4s}
.editor-toolbar{flex-shrink:0;background:linear-gradient(180deg,#2e1a0a 0%,#261508 100%);border-top:1px solid rgba(180,150,100,0.15);padding:11px 16px}
.toolbar-section{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.toolbar-section:last-child{margin-bottom:0}
.toolbar-label{font-family:'Jost',sans-serif;font-size:0.63rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(212,184,150,0.45);width:54px;flex-shrink:0}
.toolbar-slider{flex:1;-webkit-appearance:none;height:2px;background:rgba(200,168,64,0.2);border-radius:1px;outline:none;cursor:pointer}
.toolbar-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);border:2px solid #261508;box-shadow:0 0 0 1px var(--gold-dk);transition:transform 0.15s var(--ease-spring)}
.toolbar-slider::-webkit-slider-thumb:hover{transform:scale(1.3)}
.stencil-shape-row{display:flex;gap:6px;flex-wrap:wrap}
.shape-btn{padding:5px 11px;border:1px solid rgba(180,150,100,0.22);background:transparent;border-radius:3px;color:rgba(212,184,150,0.55);font-family:'Jost',sans-serif;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:border-color 0.15s,color 0.15s,background 0.15s}
.shape-btn.active,.shape-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,168,64,0.1)}
.editor-footer{display:flex;gap:10px;padding:11px 16px;background:#1a0e06;border-top:1px solid rgba(180,150,100,0.12);flex-shrink:0}

/* BUTTONS — shared */
.editor-btn{flex:1;padding:12px;border:1px solid;border-radius:3px;font-family:'Jost',sans-serif;font-size:0.7rem;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:transform 0.18s var(--ease-spring),box-shadow 0.18s}
.editor-btn:active{transform:scale(0.97)}
.editor-btn-secondary{background:transparent;border-color:rgba(180,150,100,0.28);color:rgba(212,184,150,0.7)}
.editor-btn-secondary:hover{border-color:var(--warm-tan);color:var(--warm-tan)}
.editor-btn-primary{background:linear-gradient(160deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dk) 100%);border-color:var(--gold-dk);color:var(--umber);font-weight:600;box-shadow:0 3px 12px rgba(200,168,64,0.35),inset 0 1px 0 rgba(255,255,255,0.3)}
.editor-btn-primary:hover{background:linear-gradient(160deg,#f0d070 0%,var(--gold-lt) 60%,var(--gold) 100%);box-shadow:0 5px 20px rgba(200,168,64,0.5),inset 0 1px 0 rgba(255,255,255,0.4)}
.editor-btn-primary.pressing{animation:stampPress 0.35s var(--ease-spring)}
@keyframes stampPress{0%{transform:scale(1)}40%{transform:scale(0.93)}100%{transform:scale(1)}}

/* ============ PREVIEW SCREEN ============ */
#screen-preview{background:var(--ink)}
.preview-inner{display:flex;flex-direction:column;align-items:center;width:100%;height:100%;padding:0 20px 20px}
.preview-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:500px;padding:14px 0;border-bottom:1px solid rgba(180,150,100,0.18);flex-shrink:0}
.preview-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--warm-tan)}
.preview-stamp-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.preview-stamp-img{max-width:min(85vw,340px);max-height:45vh;object-fit:contain;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.6)) drop-shadow(0 4px 16px rgba(0,0,0,0.4));animation:stampBounceIn 0.55s var(--ease-spring) both}
@keyframes stampBounceIn{from{transform:scale(0.7) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.preview-actions{display:flex;gap:10px;width:100%;max-width:500px;flex-shrink:0}

/* ============ BOOK SCREEN ============ */
#screen-book{background:var(--board-tex),#8a6040;background-size:256px 256px,cover;perspective:1400px}
.book-container{width:100%;height:100%;display:flex;flex-direction:column;align-items:center}
.book-header{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 18px;border-bottom:1px solid rgba(107,76,48,0.35);flex-shrink:0;background:rgba(140,96,64,0.7);backdrop-filter:blur(6px)}
.book-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);letter-spacing:0.03em}
.book-count{font-family:'Jost',sans-serif;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(250,246,238,0.5)}

/* Book page wrapper — 3D stage */
.book-pages-wrap{flex:1;overflow:hidden;position:relative;width:100%;display:flex;align-items:center;justify-content:center;padding:12px 14px}

/* The actual page card */
.book-page{
  position:relative;width:100%;height:100%;
  background:var(--paper-tex),var(--page-bg);background-size:256px 256px,cover;
  border-radius:3px;
  box-shadow:0 6px 32px rgba(60,35,10,0.4),0 2px 8px rgba(60,35,10,0.25),inset 0 1px 0 rgba(255,255,255,0.55),-4px 0 12px rgba(60,35,10,0.15);
  overflow:hidden;
  transform-origin:left center;
  transform-style:preserve-3d;
}
.book-page::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(60,35,10,0.10) 0%,transparent 10%,transparent 90%,rgba(60,35,10,0.06) 100%);
  pointer-events:none;z-index:1
}
/* binding shadow strip */
.book-page::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:28px;
  background:linear-gradient(90deg,rgba(60,35,10,0.18) 0%,transparent 100%);
  pointer-events:none;z-index:1
}

/* 3x5 stamp grid */
.stamps-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  padding:20px 22px 16px 32px;
  position:relative;z-index:2;
  height:100%;
  align-content:start;
}

.stamp-slot{
  aspect-ratio:1;
  border:1.5px dashed rgba(140,106,71,0.3);
  border-radius:2px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative;
  transition:border-color 0.2s,transform 0.2s var(--ease-spring);
  background:rgba(250,246,238,0.4)
}
.stamp-slot.has-stamp{border-style:solid;border-color:rgba(140,106,71,0.45)}
.stamp-slot.has-stamp:hover{border-color:var(--sienna);transform:scale(1.06)}
.stamp-slot img{width:100%;height:100%;object-fit:contain;padding:2px;display:block;transition:transform 0.25s var(--ease-spring)}
.stamp-slot img:hover{transform:scale(1.08)}

/* Stamp fly-in animation */
.stamp-slot.stamp-enter img{animation:stampFlyIn 0.5s var(--ease-spring) both}
@keyframes stampFlyIn{from{transform:scale(0.4) translateY(-30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* Page flip */
.page-flipping-out{animation:pageFlipOut 0.65s var(--ease-flip) forwards}
@keyframes pageFlipOut{
  0%{transform:perspective(1200px) rotateY(0deg);box-shadow:0 6px 32px rgba(60,35,10,0.4)}
  50%{box-shadow:-16px 6px 40px rgba(60,35,10,0.3)}
  100%{transform:perspective(1200px) rotateY(-90deg);box-shadow:-6px 6px 20px rgba(60,35,10,0.2)}
}
.page-flipping-in-r{animation:pageFlipInR 0.65s var(--ease-flip) forwards}
@keyframes pageFlipInR{
  0%{transform:perspective(1200px) rotateY(90deg)}
  100%{transform:perspective(1200px) rotateY(0deg)}
}
.page-flipping-out-r{animation:pageFlipOutR 0.65s var(--ease-flip) forwards}
@keyframes pageFlipOutR{
  0%{transform:perspective(1200px) rotateY(0deg)}
  100%{transform:perspective(1200px) rotateY(90deg)}
}
.page-flipping-in{animation:pageFlipIn 0.65s var(--ease-flip) forwards}
@keyframes pageFlipIn{
  0%{transform:perspective(1200px) rotateY(-90deg)}
  100%{transform:perspective(1200px) rotateY(0deg)}
}

.page-glow{animation:glowPulse 0.9s ease-in-out}
@keyframes glowPulse{
  0%{box-shadow:0 6px 32px rgba(60,35,10,0.4)}
  50%{box-shadow:0 6px 32px rgba(200,168,64,0.4),0 0 60px rgba(200,168,64,0.2)}
  100%{box-shadow:0 6px 32px rgba(60,35,10,0.4)}
}
.page-shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,240,180,0.35) 50%,transparent 70%);background-size:200% 100%;animation:shimmerSweep 1.2s ease-in-out;pointer-events:none;z-index:5}
@keyframes shimmerSweep{from{background-position:200% 0}to{background-position:-200% 0}}

.book-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:11px;flex-shrink:0}
.book-nav-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(250,246,238,0.15);border:1px solid rgba(180,150,100,0.3);border-radius:3px;color:rgba(250,246,238,0.65);font-family:'Jost',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s,background 0.2s}
.book-nav-btn:hover{border-color:var(--gold-lt);color:var(--gold-lt);background:rgba(200,168,64,0.12)}
.book-nav-btn:disabled{opacity:0.25;pointer-events:none}
.book-nav-btn svg{width:13px;height:13px}
.book-page-indicator{font-family:'Libre Baskerville',serif;font-style:italic;font-size:0.78rem;color:rgba(250,246,238,0.5);min-width:56px;text-align:center}
.book-footer{display:flex;justify-content:center;gap:10px;padding:10px 18px 14px;flex-shrink:0;border-top:1px solid rgba(107,76,48,0.28)}

/* ============ ICON BUTTON ============ */
.icon-btn{display:flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid rgba(180,150,100,0.25);background:transparent;border-radius:3px;color:rgba(212,184,150,0.65);font-family:'Jost',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s}
.icon-btn:hover{border-color:var(--warm-tan);color:var(--warm-tan)}
.icon-btn svg{width:14px;height:14px;flex-shrink:0}

/* ============ TOAST ============ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);background:linear-gradient(135deg,var(--parchment),var(--cream));color:var(--umber);font-family:'Jost',sans-serif;font-size:0.76rem;letter-spacing:0.1em;padding:10px 22px;border-radius:3px;border:1px solid var(--warm-tan);z-index:10000;box-shadow:0 4px 20px var(--shadow-md);transition:transform 0.35s var(--ease-spring),opacity 0.35s;opacity:0;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ============ EMPTY STATE ============ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;opacity:0.35}
.empty-state svg{width:44px;height:44px}
.empty-state-text{font-family:'Libre Baskerville',serif;font-style:italic;font-size:0.88rem;color:var(--umber);text-align:center;line-height:1.7}

/* Hidden */
#file-input{display:none}
#import-input{display:none}

/* ============ ZOOM MODAL ============ */
.stamp-modal-overlay{
  position:fixed;inset:0;z-index:8000;
  background:rgba(20,10,2,0.88);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s var(--ease-smooth);
  backdrop-filter:blur(6px);
}
.stamp-modal-overlay.open{opacity:1;pointer-events:all}
.stamp-modal-box{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;
  transform:scale(0.75) translateY(24px);
  transition:transform 0.4s var(--ease-spring);
}
.stamp-modal-overlay.open .stamp-modal-box{transform:scale(1) translateY(0)}
.stamp-modal-img{
  max-width:min(80vw,420px);max-height:55vh;
  object-fit:contain;
  filter:drop-shadow(0 16px 50px rgba(0,0,0,0.8));
}
.stamp-modal-actions{display:flex;gap:12px}
.stamp-modal-close{
  position:absolute;top:-14px;right:-14px;
  width:32px;height:32px;border-radius:50%;
  background:var(--parchment);border:1px solid var(--warm-tan);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform 0.18s var(--ease-spring),background 0.15s;
  color:var(--umber);font-size:14px;line-height:1;
  z-index:8010; /* ensure above modal box */
}
.stamp-modal-close:hover{transform:scale(1.12);background:var(--cream)}
.stamp-modal-delete{
  padding:9px 22px;border:1px solid rgba(180,80,40,0.4);
  border-radius:3px;background:transparent;
  color:rgba(200,100,60,0.85);font-family:'Jost',sans-serif;
  font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;
  transition:border-color 0.2s,color 0.2s,background 0.2s;
}
.stamp-modal-delete:hover{border-color:rgba(200,80,40,0.7);color:#c85030;background:rgba(200,80,40,0.08)}

/* ============ STAMP SELECTION ============ */
.stamp-slot.selected{
  border-color:var(--gold)!important;border-style:solid!important;
  box-shadow:0 0 0 2px rgba(200,168,64,0.35),0 4px 14px rgba(200,168,64,0.2);
}

/* ============ DRAG-AND-DROP ============ */
.stamp-slot.drag-over{
  border-color:var(--gold-lt)!important;border-style:solid!important;
  background:rgba(200,168,64,0.12)!important;
  transform:scale(1.04);
}
.stamp-slot.dragging-source{opacity:0.4;transform:scale(0.95)}

/* ============ DELETE FADE ============ */
.stamp-slot.deleting img{animation:stampFadeOut 0.35s var(--ease-smooth) forwards}
@keyframes stampFadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(0.7)}}

/* ============ CONFIRM BANNER ============ */
.confirm-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:9500;
  background:linear-gradient(135deg,var(--parchment),var(--cream));
  border-top:1px solid var(--warm-tan);
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:14px 20px;
  transform:translateY(100%);transition:transform 0.35s var(--ease-spring);
}
.confirm-bar.show{transform:translateY(0)}
.confirm-bar-label{font-family:'Libre Baskerville',serif;font-style:italic;font-size:0.88rem;color:var(--umber)}
.confirm-yes{padding:8px 20px;background:linear-gradient(135deg,#c85030,#a03020);border:none;border-radius:3px;color:#fff;font-family:'Jost',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s}
.confirm-yes:hover{opacity:0.85}
.confirm-no{padding:8px 20px;background:transparent;border:1px solid rgba(160,117,80,0.4);border-radius:3px;color:var(--sienna);font-family:'Jost',sans-serif;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s}
.confirm-no:hover{border-color:var(--sienna)}

/* ============ SAVING OVERLAY (NEW) ============ */
.saving-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(20,10,2,0.7);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s var(--ease-smooth);
  backdrop-filter:blur(3px);
}
.saving-overlay.show{opacity:1;pointer-events:all}
.saving-spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(200,168,64,0.2);
  border-top-color:var(--gold);
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.saving-label{font-family:'Jost',sans-serif;font-size:0.74rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(224,192,96,0.75)}
</style>
</head>
<body>

<!-- ENTRY -->
<div id="screen-entry" class="screen active">
  <div class="entry-bg"></div>
  <div class="entry-frame">
    <svg class="entry-ornament" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="4" width="112" height="72" rx="2" stroke="#8b6a47" stroke-width="1.5" fill="none"/>
      <rect x="10" y="10" width="100" height="60" rx="1" stroke="#8b6a47" stroke-width="0.7" fill="none" stroke-dasharray="3 3"/>
      <circle cx="60" cy="40" r="18" stroke="#8b6a47" stroke-width="1" fill="none"/>
      <path d="M44 40h32M60 24v32" stroke="#8b6a47" stroke-width="0.8"/>
      <circle cx="60" cy="40" r="3" fill="#8b6a47" opacity="0.7"/>
      <path d="M20 20L30 20M20 20L20 30M100 20L90 20M100 20L100 30M20 60L30 60M20 60L20 50M100 60L90 60M100 60L100 50" stroke="#8b6a47" stroke-width="1.2"/>
    </svg>
    <h1 class="entry-title">Philatelia</h1>
    <p class="entry-subtitle">Digital Stamp Atelier</p>
    <div class="entry-divider"></div>

      <button class="entry-btn" id="btn-open-camera">
        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="11" width="30" height="22" rx="2" stroke="#6b4c30" stroke-width="1.5"/>
          <circle cx="19" cy="22" r="7" stroke="#6b4c30" stroke-width="1.5"/>
          <circle cx="19" cy="22" r="3.5" fill="#6b4c30" opacity="0.4"/>

          <circle cx="31" cy="15" r="1.5" fill="#6b4c30" opacity="0.5"/>
        </svg>
        <span class="entry-btn-label">Camera</span>
      </button>
      <button class="entry-btn" id="btn-open-upload">
        <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="7" width="28" height="20" rx="2" stroke="#6b4c30" stroke-width="1.5"/>
          <path d="M12 17l7-7 7 7" stroke="#6b4c30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="19" y1="10" x2="19" y2="24" stroke="#6b4c30" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8 31h22" stroke="#6b4c30" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="entry-btn-label">Upload</span>
      </button>
    </div>
  </div>
  <div class="entry-footer" id="btn-open-book">
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="#8b6a47" stroke-width="1.4" stroke-linecap="round"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="#8b6a47" stroke-width="1.4"/><line x1="9" y1="7" x2="15" y2="7" stroke="#8b6a47" stroke-width="1" stroke-linecap="round"/><line x1="9" y1="11" x2="13" y2="11" stroke="#8b6a47" stroke-width="1" stroke-linecap="round"/></svg>
    <span class="entry-footer-label">My Collection</span>
    <svg viewBox="0 0 24 24" fill="none" style="width:13px;height:13px"><path d="M9 18l6-6-6-6" stroke="#8b6a47" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
</div>

<!-- CAMERA -->

  <div class="saving-label">Adding to collection…</div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept="image/*">
<input type="file" id="import-input" accept="image/png,image/*">
<canvas id="capture-canvas" style="display:none"></canvas>

<script>
const state = {
  currentScreen: 'entry',
  sourceImageData: null,
  stampDataURL: null,
  stamps: [],
  currentPage: 0,
  STAMPS_PER_PAGE: 15, // 3x5
  stencilShape: 'rect',
  imgX: 0, imgY: 0,
  imgScale: 1, imgRotate: 0,
  stencilX: 0, stencilY: 0,
  stencilScale: 0.65,
  cameraStream: null,
  facingMode: 'environment',
  canvasSize: 0,
  _dragHinted: false
};

/* =============================================
   SCREEN ROUTER
   ============================================= */
function showScreen(id) {
  const cur = document.querySelector('.screen.active');
  const nxt = document.getElementById('screen-' + id);
  if (!nxt || cur === nxt) return;
  if (cur) { cur.classList.add('exit'); setTimeout(() => cur.classList.remove('active', 'exit'), 560); }
  setTimeout(() => nxt.classList.add('active'), 60);
  state.currentScreen = id;
}

function showToast(msg, dur = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), dur);
}

/* =============================================
   SAVING OVERLAY
   ============================================= */
function showSavingOverlay() {
  document.getElementById('saving-overlay').classList.add('show');
}
function hideSavingOverlay() {
  document.getElementById('saving-overlay').classList.remove('show');
}

/* =============================================
   ENTRY
   ============================================= */
document.getElementById('btn-open-camera').addEventListener('click', openCamera);
document.getElementById('btn-open-upload').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('btn-open-book').addEventListener('click', () => { showScreen('book'); renderBook(); });

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { state.sourceImageData = ev.target.result; e.target.value = ''; openEditor(); };
  reader.readAsDataURL(file);
});

/* IMPORT STAMP (transparent PNG into collection) */
document.getElementById('import-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const img = new Image();
    img.onload = async () => {
      showSavingOverlay();
      await importStampToCollection(img.src);
      e.target.value = '';
      hideSavingOverlay();
      renderBook();
      showToast('Stamp imported');
      animateLastStampSlot();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('btn-import-stamp').addEventListener('click', () => document.getElementById('import-input').click());

function animateLastStampSlot() {
  const SLOTS = state.STAMPS_PER_PAGE;
  const idx = state.stamps.length - 1;
  const pageOfStamp = Math.floor(idx / SLOTS);
  if (pageOfStamp === state.currentPage) {
    const grid = document.getElementById('stamps-grid');
    const slots = grid.querySelectorAll('.stamp-slot');
    const slotIdx = idx % SLOTS;
    if (slots[slotIdx]) {
      slots[slotIdx].classList.add('stamp-enter');
      setTimeout(() => slots[slotIdx].classList.remove('stamp-enter'), 600);
    }
  }
}

/* =============================================
   CAMERA
   ============================================= */
async function openCamera() {
  showScreen('camera');
  await startCamera();
}
async function startCamera() {
  stopCamera();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } } });
    state.cameraStream = stream;
    document.getElementById('camera-video').srcObject = stream;
  } catch { showToast('Camera unavailable — please upload'); showScreen('entry'); }
}
function stopCamera() {
  if (state.cameraStream) { state.cameraStream.getTracks().forEach(t => t.stop()); state.cameraStream = null; }
}
document.getElementById('btn-cam-back').addEventListener('click', () => { stopCamera(); showScreen('entry'); });
document.getElementById('btn-cam-flip').addEventListener('click', () => { state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment'; startCamera(); });
document.getElementById('btn-shutter').addEventListener('click', () => {
  const flash = document.getElementById('shutter-flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 400);
  const video = document.getElementById('camera-video');
  const cap = document.getElementById('capture-canvas');
  const size = Math.min(video.videoWidth, video.videoHeight);
  cap.width = size; cap.height = size;
  const ctx = cap.getContext('2d');
  ctx.drawImage(video, (video.videoWidth-size)/2, (video.videoHeight-size)/2, size, size, 0, 0, size, size);
  state.sourceImageData = cap.toDataURL('image/jpeg', 0.92);
  setTimeout(() => { stopCamera(); openEditor(); }, 320);
});

/* =============================================
   EDITOR
   ============================================= */
let editorCanvas, editorCtx, sourceImg;

function openEditor() {
  showScreen('editor');
  setTimeout(() => {
    initEditorCanvas();
    resetEditorState();
    loadSourceImage(() => { fitImageToCanvas(); drawEditor(); });
  }, 80);
}

function resetEditorState() {
  const cs = state.canvasSize || 0;
  state.imgX = 0; state.imgY = 0; state.imgScale = 1; state.imgRotate = 0;
  state.stencilX = cs/2; state.stencilY = cs/2;
  state.stencilScale = 0.65; state.stencilShape = 'rect';
  state._dragHinted = false;
  document.getElementById('img-zoom').value = 100;
  document.getElementById('img-rotate').value = 0;
  document.getElementById('stencil-scale').value = 65;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-shape="rect"]').classList.add('active');
  const hint = document.getElementById('editor-drag-hint');
  if (hint) hint.style.opacity = '1';
}

function initEditorCanvas() {
  editorCanvas = document.getElementById('editor-canvas');
  editorCtx = editorCanvas.getContext('2d');
  const area = document.getElementById('editor-canvas-area');
  const sz = Math.min(area.clientWidth, area.clientHeight, 500);
  state.canvasSize = sz;
  editorCanvas.width = sz; editorCanvas.height = sz;
  editorCanvas.style.width = sz + 'px'; editorCanvas.style.height = sz + 'px';
  state.stencilX = sz/2; state.stencilY = sz/2;
}

function loadSourceImage(cb) {
  sourceImg = new Image();
  sourceImg.onload = cb;
  sourceImg.src = state.sourceImageData;
}

function fitImageToCanvas() {
  const cs = state.canvasSize;
  const asp = sourceImg.width / sourceImg.height;
  let w, h;
  if (asp >= 1) { w = cs; h = cs/asp; } else { h = cs; w = cs*asp; }
  state.imgScale = w / sourceImg.width;
  state.imgX = (cs-w)/2; state.imgY = (cs-h)/2;
}

function drawEditor() {
  if (!editorCtx || !sourceImg) return;
  const cs = state.canvasSize;
  const ctx = editorCtx;
  ctx.clearRect(0, 0, cs, cs);
  ctx.fillStyle = '#1a0e06';
  ctx.fillRect(0, 0, cs, cs);
  ctx.save();
  const icx = state.imgX + (sourceImg.width * state.imgScale)/2;
  const icy = state.imgY + (sourceImg.height * state.imgScale)/2;
  ctx.translate(icx, icy);
  ctx.rotate(state.imgRotate * Math.PI/180);
  ctx.scale(state.imgScale, state.imgScale);
  ctx.drawImage(sourceImg, -sourceImg.width/2, -sourceImg.height/2);
  ctx.restore();
  const stencilSz = cs * state.stencilScale;
  const scx = state.stencilX, scy = state.stencilY;
  const off = document.createElement('canvas');
  off.width = cs; off.height = cs;
  const offCtx = off.getContext('2d');
  offCtx.fillStyle = 'rgba(15,8,2,0.72)';
  offCtx.fillRect(0, 0, cs, cs);
  offCtx.globalCompositeOperation = 'destination-out';
  offCtx.fillStyle = 'rgba(0,0,0,1)';
  drawStencilPath(offCtx, scx, scy, stencilSz, stencilSz);
  offCtx.fill();
  ctx.drawImage(off, 0, 0);
  ctx.save();
  ctx.strokeStyle = 'rgba(224,192,96,0.6)';
  ctx.lineWidth = 1.5;
  drawStencilPath(ctx, scx, scy, stencilSz, stencilSz);
  ctx.stroke();
  ctx.restore();
  ctx.save();
  drawStencilPerforations(ctx, scx, scy, stencilSz, stencilSz);
  ctx.restore();
}

function drawStencilPath(ctx, cx, cy, w, h) {
  const hw = w/2, hh = h/2;
  ctx.beginPath();
  switch(state.stencilShape) {
    case 'rect': ctx.rect(cx-hw, cy-hh, w, h); break;
    case 'oval': ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI*2); break;
    case 'diamond': ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy); ctx.closePath(); break;
    case 'hexagon': for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;const px=cx+hw*Math.cos(a);const py=cy+hh*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.closePath(); break;
  }
}

function drawStencilPerforations(ctx, cx, cy, w, h) {
  const pts = getPerimeterPoints(cx, cy, w, h, 13);
  ctx.fillStyle = 'rgba(224,192,96,0.65)';
  for(const [px,py] of pts) { ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2); ctx.fill(); }
}

/* EDITOR CONTROLS */
document.getElementById('img-zoom').addEventListener('input', e => {
  const ns = e.target.value/100, os = state.imgScale, d = ns/os;
  const cx = state.canvasSize/2, cy = state.canvasSize/2;
  state.imgX = cx+(state.imgX-cx)*d; state.imgY = cy+(state.imgY-cy)*d;
  state.imgScale = ns; drawEditor();
});
document.getElementById('img-rotate').addEventListener('input', e => { state.imgRotate = parseInt(e.target.value); drawEditor(); });
document.getElementById('stencil-scale').addEventListener('input', e => { state.stencilScale = e.target.value/100; drawEditor(); });
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); state.stencilShape = btn.dataset.shape; drawEditor();
  });
});
document.getElementById('btn-editor-reset').addEventListener('click', () => { resetEditorState(); fitImageToCanvas(); drawEditor(); });
document.getElementById('btn-editor-back').addEventListener('click', () => { stopCamera(); showScreen('entry'); });

/* DRAG */
let dragMode=null,isDragging=false,lastX=0,lastY=0,isPinching=false,pinchDist0=0,pinchScale0=1,pinchAngle0=0;

function pointInStencil(px,py) {
  const cs=state.canvasSize,sz=cs*state.stencilScale,hw=sz/2,hh=sz/2;
  return px>=state.stencilX-hw&&px<=state.stencilX+hw&&py>=state.stencilY-hh&&py<=state.stencilY+hh;
}
function editorPointerDown(x,y,forceImage) {
  state._dragHinted=true;
  const hint=document.getElementById('editor-drag-hint');
  if(hint)hint.style.opacity='0';
  isDragging=true;lastX=x;lastY=y;
  dragMode=(!forceImage&&pointInStencil(x,y))?'stencil':'image';
}
function editorPointerMove(x,y) {
  if(!isDragging)return;
  const dx=x-lastX,dy=y-lastY;lastX=x;lastY=y;
  if(dragMode==='stencil') {
    const cs=state.canvasSize,half=(cs*state.stencilScale)/2;
    state.stencilX=Math.max(half*0.5,Math.min(cs-half*0.5,state.stencilX+dx));
    state.stencilY=Math.max(half*0.5,Math.min(cs-half*0.5,state.stencilY+dy));
  } else { state.imgX+=dx; state.imgY+=dy; }
  drawEditor();
}
function editorPointerUp(){isDragging=false;dragMode=null;}

const editorCanvasEl=document.getElementById('editor-canvas');
editorCanvasEl.addEventListener('mousedown',e=>{const r=editorCanvasEl.getBoundingClientRect();editorPointerDown(e.clientX-r.left,e.clientY-r.top,e.button===2);});
window.addEventListener('mousemove',e=>{if(!isDragging)return;const r=editorCanvasEl.getBoundingClientRect();editorPointerMove(e.clientX-r.left,e.clientY-r.top);});
window.addEventListener('mouseup',editorPointerUp);
editorCanvasEl.addEventListener('contextmenu',e=>e.preventDefault());
editorCanvasEl.addEventListener('touchstart',e=>{
  if(e.touches.length===1){const t=e.touches[0],r=editorCanvasEl.getBoundingClientRect();editorPointerDown(t.clientX-r.left,t.clientY-r.top,false);}
  else if(e.touches.length===2){isPinching=true;isDragging=false;pinchDist0=getTouchDist(e.touches);pinchScale0=state.imgScale;pinchAngle0=getTouchAngle(e.touches);}
  e.preventDefault();
},{passive:false});
editorCanvasEl.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&!isPinching){const t=e.touches[0],r=editorCanvasEl.getBoundingClientRect();editorPointerMove(t.clientX-r.left,t.clientY-r.top);}
  else if(e.touches.length===2&&isPinching){
    const dist=getTouchDist(e.touches),angle=getTouchAngle(e.touches);
    const os=state.imgScale;state.imgScale=Math.max(0.1,pinchScale0*(dist/pinchDist0));
    const d=state.imgScale/os,cx=state.canvasSize/2,cy=state.canvasSize/2;
    state.imgX=cx+(state.imgX-cx)*d;state.imgY=cy+(state.imgY-cy)*d;
    state.imgRotate+=(angle-pinchAngle0)*(180/Math.PI);pinchAngle0=angle;
    document.getElementById('img-zoom').value=Math.round(state.imgScale*100);
    document.getElementById('img-rotate').value=Math.round(state.imgRotate);
    drawEditor();
  }
  e.preventDefault();
},{passive:false});
editorCanvasEl.addEventListener('touchend',e=>{if(e.touches.length<2)isPinching=false;if(e.touches.length===0)editorPointerUp();},{passive:false});
function getTouchDist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
function getTouchAngle(t){return Math.atan2(t[1].clientY-t[0].clientY,t[1].clientX-t[0].clientX);}

/* =============================================
   STAMP GENERATION
   ============================================= */
document.getElementById('btn-create-stamp').addEventListener('click', () => {
  if(!sourceImg||!state.sourceImageData){showToast('No image loaded');return;}
  if(state.canvasSize===0){showToast('Editor not ready — please wait');return;}
  const btn=document.getElementById('btn-create-stamp');
  btn.classList.add('pressing');
  setTimeout(()=>btn.classList.remove('pressing'),400);
  setTimeout(()=>{
    try { generateStamp(); }
    catch(e) { console.error('generateStamp error:', e); showToast('Stamp generation failed — please try again'); }
  }, 180);
});

function generateStamp() {
  const cs=state.canvasSize;
  const stencilSz=Math.round(cs*state.stencilScale);
  const perfPad=24;
  const outputSz=stencilSz+perfPad*2;
  const out=document.createElement('canvas');
  out.width=outputSz;out.height=outputSz;
  const ctx=out.getContext('2d');
  const outCx=outputSz/2,outCy=outputSz/2;
  ctx.save();
  drawStencilPath(ctx,outCx,outCy,stencilSz,stencilSz);
  ctx.clip();
  const imgCenterX=state.imgX+(sourceImg.width*state.imgScale)/2;
  const imgCenterY=state.imgY+(sourceImg.height*state.imgScale)/2;
  const offsetX=outCx+(imgCenterX-state.stencilX);
  const offsetY=outCy+(imgCenterY-state.stencilY);
  ctx.translate(offsetX,offsetY);
  ctx.rotate(state.imgRotate*Math.PI/180);
  ctx.scale(state.imgScale,state.imgScale);
  ctx.drawImage(sourceImg,-sourceImg.width/2,-sourceImg.height/2);
  ctx.restore();
  ctx.save();
  drawStencilPath(ctx,outCx,outCy,stencilSz,stencilSz);
  ctx.clip();
  const vg=ctx.createRadialGradient(outCx,outCy,stencilSz*0.2,outCx,outCy,stencilSz*0.62);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.22)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,outputSz,outputSz);
  const eg=ctx.createLinearGradient(outCx-stencilSz/2,outCy-stencilSz/2,outCx+stencilSz*0.4,outCy+stencilSz*0.4);
  eg.addColorStop(0,'rgba(255,255,255,0.12)');eg.addColorStop(1,'rgba(0,0,0,0.04)');
  ctx.fillStyle=eg;ctx.fillRect(0,0,outputSz,outputSz);
  ctx.restore();
  ctx.save();
  ctx.strokeStyle='rgba(180,150,80,0.6)';ctx.lineWidth=1.5;
  drawStencilPath(ctx,outCx,outCy,stencilSz,stencilSz);ctx.stroke();
  ctx.restore();
  const perf=getPerimeterPoints(outCx,outCy,stencilSz,stencilSz,13);
  ctx.save();
  ctx.globalCompositeOperation='destination-out';
  ctx.fillStyle='rgba(0,0,0,1)';
  for(const [px,py] of perf){ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fill();}
  ctx.restore();
  try {
    state.stampDataURL = out.toDataURL('image/png');
  } catch(e) {
    showToast('Could not capture stamp — please try uploading the image instead.');
    console.error('Stamp canvas error:', e);
    return;
  }
  showPreview();
}

function getPerimeterPoints(cx,cy,w,h,gap) {
  const pts=[],hw=w/2,hh=h/2;
  switch(state.stencilShape) {
    case 'rect':{
      const perim=2*(w+h),count=Math.floor(perim/gap);
      for(let i=0;i<count;i++){const d=(i/count)*perim;let px,py;
        if(d<w){px=cx-hw+d;py=cy-hh;}else if(d<w+h){px=cx+hw;py=cy-hh+(d-w);}
        else if(d<2*w+h){px=cx+hw-(d-w-h);py=cy+hh;}else{px=cx-hw;py=cy+hh-(d-2*w-h);}
        pts.push([px,py]);}break;}
    case 'oval':{
      const count=Math.max(24,Math.floor((w+h)*Math.PI/gap));
      for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2;pts.push([cx+hw*Math.cos(a),cy+hh*Math.sin(a)]);}break;}
    case 'diamond':{
      const sides=[[cx,cy-hh,cx+hw,cy],[cx+hw,cy,cx,cy+hh],[cx,cy+hh,cx-hw,cy],[cx-hw,cy,cx,cy-hh]];
      for(const [x1,y1,x2,y2] of sides){const n=Math.floor(Math.hypot(x2-x1,y2-y1)/gap);for(let i=0;i<n;i++)pts.push([x1+(x2-x1)*i/n,y1+(y2-y1)*i/n]);}break;}
    case 'hexagon':{
      for(let s=0;s<6;s++){const a1=(Math.PI/3)*s-Math.PI/6,a2=(Math.PI/3)*(s+1)-Math.PI/6;
        const x1=cx+hw*Math.cos(a1),y1=cy+hh*Math.sin(a1),x2=cx+hw*Math.cos(a2),y2=cy+hh*Math.sin(a2);
        const n=Math.floor(Math.hypot(x2-x1,y2-y1)/gap);for(let i=0;i<n;i++)pts.push([x1+(x2-x1)*i/n,y1+(y2-y1)*i/n]);}break;}
  }
  return pts;
}

function showPreview() {
  const img=document.getElementById('preview-stamp-img');
  img.src=state.stampDataURL;
  img.style.display='block';

  img.classList.remove('preview-stamp-img');

  img.classList.add('preview-stamp-img');
  showScreen('preview');
}

/* =============================================
   FIX: "Add to Collection" — seamless save → navigate → animate
   ============================================= */
document.getElementById('btn-add-to-book').addEventListener('click', async () => {
  if (!state.stampDataURL) { showToast('No stamp to save'); return; }

  const btn = document.getElementById('btn-add-to-book');
  btn.disabled = true;
  btn.classList.add('pressing');
  setTimeout(() => btn.classList.remove('pressing'), 400);

  // 1. Show saving overlay
  showSavingOverlay();

  try {
    // 2. Save to collection (includes UHD normalise + IndexedDB)
    await saveStampToCollection(state.stampDataURL);

    // 3. Navigate to correct page (last page where stamp lives)
    const SLOTS = state.STAMPS_PER_PAGE;
    const stampIdx = state.stamps.length - 1;
    state.currentPage = Math.floor(stampIdx / SLOTS);

    // 4. Render book (fully up-to-date)
    renderBook();

    // 5. Hide overlay then switch screens
    hideSavingOverlay();
    showScreen('book');

    // 6. After screen transition, animate the stamp slot in
    setTimeout(() => {
      animateLastStampSlot();

      // Page glow + shimmer on landing
      const page = document.getElementById('current-page');
      page.classList.add('page-glow');
      const sh = document.createElement('div');
      sh.className = 'page-shimmer';
      page.appendChild(sh);
      setTimeout(() => { sh.remove(); page.classList.remove('page-glow'); }, 1300);
    }, 350); // after screen fade-in

    showToast('Stamp added to collection ✦');

  } catch (err) {
    hideSavingOverlay();
    showToast('Save failed — please try again');
    console.error('Save error:', err);
  } finally {
    btn.disabled = false;
  }
});

/* =============================================
   BOOK
   ============================================= */
function renderBook() {
  const SLOTS=state.STAMPS_PER_PAGE;
  const totalPages=Math.max(1,Math.ceil(state.stamps.length/SLOTS));
  if(state.currentPage>=totalPages)state.currentPage=totalPages-1;
  const grid=document.getElementById('stamps-grid');
  grid.innerHTML='';
  const start=state.currentPage*SLOTS;
  document.getElementById('book-count').textContent=state.stamps.length+(state.stamps.length===1?' stamp':' stamps');
  for(let i=0;i<SLOTS;i++){
    const slot=document.createElement('div');
    slot.className='stamp-slot';
    const stampObj=state.stamps[start+i];
    if(stampObj){
      slot.classList.add('has-stamp');
      slot.dataset.id=stampObj.id;
      const img=document.createElement('img');
      img.src=stampObj.image;
      img.alt='Stamp '+(start+i+1);
      slot.appendChild(img);
      slot.addEventListener('click', () => openModal(stampObj));
      setupDragDrop(slot, stampObj);
    }
    grid.appendChild(slot);
  }
  document.getElementById('page-indicator').textContent=(state.currentPage+1)+' / '+totalPages;
  document.getElementById('btn-prev-page').disabled=state.currentPage===0;
  document.getElementById('btn-next-page').disabled=state.currentPage>=totalPages-1;
}

function flipPage(dir) {
  const page=document.getElementById('current-page');
  const outClass=dir===1?'page-flipping-out':'page-flipping-out-r';
  const inClass=dir===1?'page-flipping-in-r':'page-flipping-in';
  page.classList.add(outClass);
  setTimeout(()=>{
    page.classList.remove(outClass);
    state.currentPage+=dir;
    renderBook();
    page.classList.add(inClass);
    setTimeout(()=>page.classList.remove(inClass),680);
  },660);
}

document.getElementById('btn-prev-page').addEventListener('click', () => flipPage(-1));
document.getElementById('btn-next-page').addEventListener('click', () => flipPage(1));
document.getElementById('btn-book-home').addEventListener('click', () => showScreen('entry'));
document.getElementById('btn-book-add-new').addEventListener('click', () => document.getElementById('file-input').click());

document.getElementById('btn-export-page').addEventListener('click', () => {
  const SLOTS=state.STAMPS_PER_PAGE;
  const start=state.currentPage*SLOTS;
  const stamps=state.stamps.slice(start,start+SLOTS).map(s=>s?s.image:null).filter(Boolean);
  if(!stamps.length){showToast('No stamps on this page');return;}
  const cols=3,rows=5,stampSz=400,padding=24,bgPad=40;
  const W=cols*stampSz+(cols-1)*padding+bgPad*2;
  const H=rows*stampSz+(rows-1)*padding+bgPad*2;
  const out=document.createElement('canvas');out.width=W;out.height=H;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#f5edda';ctx.fillRect(0,0,W,H);
  const loads=stamps.map((src,idx)=>new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const col=idx%cols,row=Math.floor(idx/cols);
      const x=bgPad+col*(stampSz+padding),y=bgPad+row*(stampSz+padding);
      ctx.drawImage(img,x,y,stampSz,stampSz);res();
    };img.src=src;
  }));
  Promise.all(loads).then(()=>{
    const a=document.createElement('a');a.href=out.toDataURL('image/png');
    a.download='collection-page-'+(state.currentPage+1)+'.png';a.click();
    showToast('Page exported');
  });
});

/* RESIZE */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    if(state.currentScreen==='editor'&&sourceImg){
      const oldSz=state.canvasSize;initEditorCanvas();const newSz=state.canvasSize;
      if(oldSz>0&&newSz!==oldSz){const r=newSz/oldSz;state.imgX*=r;state.imgY*=r;state.imgScale*=r;}
      drawEditor();
    }
  },200);
});

/* =============================================
   INDEXEDDB PERSISTENCE
   ============================================= */
const DB_NAME = 'StampAppDB';
const DB_VER  = 1;
const STORE   = 'stamps';
let db = null;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains(STORE)) {
        const store = idb.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('position', 'position', { unique: false });
      }
    };
    req.onsuccess  = e => { db = e.target.result; resolve(db); };
    req.onerror    = e => reject(e.target.error);
  });
}

function saveStamp(stamp) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(stamp);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

function getAllStamps() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).index('position').getAll();
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

function deleteStampDB(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

function updateStampOrder(stampsArr) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const store = tx.objectStore(STORE);
    stampsArr.forEach((s, i) => { s.position = i; store.put(s); });
    tx.oncomplete = resolve;
    tx.onerror = e => reject(e.target.error);
  });
}

function makeStampObj(dataURL, position) {
  return { id: 'stamp_' + Date.now() + '_' + Math.random().toString(36).slice(2), image: dataURL, createdAt: Date.now(), position };
}

/* =============================================
   UHD NORMALISE (2048x2048)
   ============================================= */
function normaliseToUHD(dataURL) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = 2048; c.height = 2048;
      const ctx = c.getContext('2d');
      const scale = Math.min(2048 / img.width, 2048 / img.height);
      const dx = (2048 - img.width * scale) / 2;
      const dy = (2048 - img.height * scale) / 2;
      ctx.drawImage(img, dx, dy, img.width * scale, img.height * scale);
      resolve(c.toDataURL('image/png'));
    };
    img.src = dataURL;
  });
}

/* =============================================
   ZOOM MODAL — FIXED
   The overlay click-to-close uses pointer-events correctly.
   The X button is z-index elevated above the modal box.
   ============================================= */
let modalStampId = null;

function openModal(stampObj) {
  modalStampId = stampObj.id;
  document.getElementById('modal-img').src = stampObj.image;
  document.getElementById('stamp-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('stamp-modal').classList.remove('open');
  modalStampId = null;
}

// Close button — direct listener, z-index 8010, no overlay interference
document.getElementById('modal-close').addEventListener('click', (e) => {
  e.stopPropagation(); // prevent bubble to overlay
  closeModal();
});

// Clicking the dark backdrop closes modal (but NOT clicking inside the box)
document.getElementById('stamp-modal').addEventListener('click', (e) => {
  // Only close if the click target IS the overlay itself (not any child)
  if (e.target === document.getElementById('stamp-modal')) {
    closeModal();
  }
});

document.getElementById('modal-export').addEventListener('click', (e) => {
  e.stopPropagation();
  const img = document.getElementById('modal-img');
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'stamp-' + Date.now() + '.png';
  a.click();
  showToast('Stamp exported');
});

/* =============================================
   CONFIRM + DELETE
   ============================================= */
let pendingDeleteId = null;

document.getElementById('modal-delete').addEventListener('click', (e) => {
  e.stopPropagation();
  pendingDeleteId = modalStampId;
  closeModal();
  document.getElementById('confirm-bar').classList.add('show');
});

document.getElementById('confirm-no').addEventListener('click', () => {
  document.getElementById('confirm-bar').classList.remove('show');
  pendingDeleteId = null;
});

document.getElementById('confirm-yes').addEventListener('click', async () => {
  document.getElementById('confirm-bar').classList.remove('show');
  if (!pendingDeleteId) return;
  const slot = document.querySelector(`.stamp-slot[data-id="${pendingDeleteId}"]`);
  if (slot) {
    slot.classList.add('deleting');
    await new Promise(r => setTimeout(r, 380));
  }
  await deleteStampDB(pendingDeleteId);
  state.stamps = state.stamps.filter(s => s.id !== pendingDeleteId);
  await updateStampOrder(state.stamps);
  pendingDeleteId = null;
  renderBook();
  showToast('Stamp removed');
});

/* =============================================
   DRAG-AND-DROP REARRANGE
   ============================================= */
let dragSrcId = null;

function setupDragDrop(slot, stampObj) {
  slot.setAttribute('draggable', 'true');
  slot.addEventListener('dragstart', e => {
    dragSrcId = stampObj.id;
    slot.classList.add('dragging-source');
    e.dataTransfer.effectAllowed = 'move';
  });
  slot.addEventListener('dragend', () => {
    slot.classList.remove('dragging-source');
    document.querySelectorAll('.stamp-slot').forEach(s => s.classList.remove('drag-over'));
  });
  slot.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.stamp-slot').forEach(s => s.classList.remove('drag-over'));
    if (dragSrcId !== stampObj.id) slot.classList.add('drag-over');
  });
  slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
  slot.addEventListener('drop', async e => {
    e.preventDefault();
    slot.classList.remove('drag-over');
    if (!dragSrcId || dragSrcId === stampObj.id) return;
    const srcIdx = state.stamps.findIndex(s => s.id === dragSrcId);
    const dstIdx = state.stamps.findIndex(s => s.id === stampObj.id);
    if (srcIdx < 0 || dstIdx < 0) return;
    const tmp = state.stamps[srcIdx];
    state.stamps[srcIdx] = state.stamps[dstIdx];
    state.stamps[dstIdx] = tmp;
    await updateStampOrder(state.stamps);
    dragSrcId = null;
    renderBook();
  });
}

/* =============================================
   SAVE HELPERS
   ============================================= */
async function saveStampToCollection(dataURL) {
  let storeURL = dataURL;
  try { storeURL = await normaliseToUHD(dataURL); } catch(e) { console.warn('UHD upscale failed, storing original', e); }
  const obj = makeStampObj(storeURL, state.stamps.length);
  state.stamps.push(obj);
  await saveStamp(obj);
}

async function importStampToCollection(rawDataURL) {
  let storeURL = rawDataURL;
  try { storeURL = await normaliseToUHD(rawDataURL); } catch(e) { console.warn('UHD upscale failed, storing original', e); }
  const obj = makeStampObj(storeURL, state.stamps.length);
  state.stamps.push(obj);
  await saveStamp(obj);
}

/* =============================================
   INIT
   ============================================= */
async function appInit() {
  await initDB();
  const saved = await getAllStamps();
  state.stamps = saved;
}

appInit().then(() => {
  showScreen('entry');
}).catch(err => {
  console.warn('DB init failed:', err);
  showScreen('entry');
});
